name: add-eval-coverage-for-pi-extension-discovery
description: Add a marker Pi extension to the todo-api fixture and validate it
  loads during Pi backend eval scenarios
created: 2026-03-30
compiled: 2026-03-30
mode: trivial-fixture-addition
base_branch: main
validate:
  - pnpm type-check
plans:
