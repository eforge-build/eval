name: add-llm-as-judge-quality-scoring-to-the-eval-harness
description: Add LLM-as-judge quality scoring (absolute rubric per run +
  pairwise head-to-head per scenario group) to the eval harness, gated behind
  --score-quality, using @anthropic-ai/claude-agent-sdk for auth via Claude Code
  on the host.
base_branch: main
mode: excursion
validate:
  - pnpm install
  - pnpm type-check
plans:
  - id: plan-01-quality-scoring
    name: LLM-as-judge quality scoring (absolute + pairwise)
    depends_on: []
    branch: add-llm-as-judge-quality-scoring-to-the-eval-harness/quality-scoring
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
    - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - maintainability
      - api-design
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD adds a cohesive new feature (LLM-as-judge quality scoring)
    to an existing TypeScript eval harness. It touches multiple files
    (runner.ts, compare.ts, build-result.ts, types.ts, package.json, run.sh,
    CLAUDE.md) plus introduces new files (score-quality.ts, judge.yaml, two
    prompt files), but the work is a single coherent vertical with sequential
    dependencies (types -> judge module -> runner integration -> compare
    integration). A single planner session can enumerate all the plans and
    dependencies — there are no 4+ genuinely independent subsystems requiring
    delegated module planning, so excursion is correct over expedition. It's
    well beyond errand scope because it's multi-file with non-trivial logic (SDK
    integration, JSON schema validation, snapshotting, pairwise aggregation).
    plan-review-cycle is included because the PRD has well-defined data shapes
    and acceptance criteria that benefit from a plan-quality gate before
    implementation. For build: implement first, then review-cycle in parallel
    with doc-update (CLAUDE.md updates are documentation and don't conflict with
    review of the code), followed by test-write since the acceptance criteria
    explicitly call for sanity/regression checks and the harness is itself a
    testing tool where test coverage matters. Review uses standard strictness
    with correctness/maintainability/api-design perspectives — appropriate for a
    feature that introduces new public types and integration points but isn't
    security-critical. maxRounds of 2 balances quality against the iterative
    cost of review on a multi-file change."
