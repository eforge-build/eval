name: eval-harness-skip-guard
description: Make unexpected plan:skip a hard scenario failure in the eval
  harness via a gating skip expectation plus an implicit skip=false default when
  work was expected.
created: 2026-04-15
compiled: 2026-04-15
mode: excursion
base_branch: main
validate:
  - pnpm type-check
plans:
  - id: plan-01-skip-guard
    name: Gate scenario pass on skip expectation and apply implicit skip=false
    depends_on: []
    branch: eval-harness-skip-guard/skip-guard
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - - doc-update
      - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - maintainability
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a focused, multi-file change to an existing eval
    harness: two TypeScript files (runner.ts, check-expectations.ts) get
    targeted logic changes, plus an audit pass over scenarios.yaml. It is
    clearly more than a typo fix (there is non-trivial conditional logic around
    implicit expectation defaults and a gating semantics change), but nowhere
    near an expedition — there are no independent subsystems or architectural
    boundaries. Excursion is the right scope. For compile stages I include
    planner plus plan-review-cycle because the subtlety here is in the spec
    itself (when does the implicit skip:false fire? which scenarios need
    explicit skip:true?) — a plan review cycle catches scope/logic issues before
    code is written. For build I run implement, then review-cycle for quality
    (the change is a correctness/semantics change to a test gate, so getting it
    right matters), with doc-update and test-write in parallel at the end:
    doc-update covers the PRD's explicit requirement to document that `skip` is
    now a gating expectation (comment update in runner.ts or
    check-expectations.ts), and test-write covers adding/updating unit coverage
    for the new implicit-skip logic and the gating behavior. Review config is
    standard strictness with correctness + maintainability perspectives and
    maxRounds=2 — appropriate for a logic change in harness code that is not
    security- or data-sensitive but does guard CI pass/fail semantics."
