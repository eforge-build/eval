name: eval-harness-updates-for-per-agent-runtime-config
description: Align the eval harness with eforge's renamed profile/runtime
  terminology, support multiple env files per profile, and add a mixed-runtime
  smoke profile.
base_branch: main
mode: excursion
validate:
  - pnpm install
  - pnpm type-check
plans:
  - id: plan-01-rename-and-multi-env
    name: Rename backend → profile, add envFiles list, add mixed-runtime profile
    depends_on: []
    branch: eval-harness-updates-for-per-agent-runtime-config/rename-and-multi-env
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: This PRD is a coordinated mechanical rename across the eval harness
    (files, flags, types, result.json schema, MCP tool schemas, docs) plus a
    small shape change to env-file mapping and a new mixed-runtime profile
    fixture. While it touches many files, the changes are tightly coupled
    (everything keys off the same backend→profile rename) and form a sequential
    dependency chain rather than 4+ independent subsystems, so excursion is
    correct - expedition would be overkill. The work spans run.sh, scenarios.ts,
    runner.ts, compare.ts, the MCP server, README/CLAUDE.md, and YAML fixtures,
    so a single planner pass can enumerate the plans and a plan-review-cycle
    adds a quality gate to ensure the rename is exhaustive and the env-file list
    semantics are correct before building. defaultBuild keeps implement
    sequential (predecessor of review-cycle and doc-update), then runs
    review-cycle in parallel with doc-update since the PRD explicitly calls out
    updating README.md and CLAUDE.md - doc-update has no predecessor conflict
    with review-cycle. Review uses standard strictness with two perspectives
    (correctness for catching missed rename sites and consistency for ensuring
    the new naming is uniform across files/types/schemas), maxRounds=2 since
    this is a rename refactor (not novel logic) where one or two passes should
    suffice, and autoAcceptBelow=suggestion to avoid churn on stylistic nits.
    Test stages are omitted because the PRD's validation is the existing
    smoke-test scenario invoked via run.sh, not new unit tests; the type-check +
    smoke-run is handled by post-merge validation.
