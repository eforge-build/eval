name: replace-log-parsing-with-cwd-based-session-lookup-in-eval-result-builder
description: Replace brittle log-parsing in the eval result builder with a
  deterministic cwd → session_id → run_ids lookup against monitor.db,
  eliminating the unfiltered-query fallback that causes catastrophic metric
  inflation on fast-failing variants.
created: 2026-04-14
compiled: 2026-04-14
mode: excursion
base_branch: main
validate:
  - pnpm type-check
plans:
  - id: plan-01-cwd-session-lookup
    name: Replace log-parsing with cwd-based session lookup
    depends_on: []
    branch: replace-log-parsing-with-cwd-based-session-lookup-in-eval-result-builder/cwd-session-lookup
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - - doc-update
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - maintainability
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This PRD is a focused refactor touching 3-4 TypeScript files in the
    eval harness (lib/build-result.ts, lib/runner.ts, lib/check-expectations.ts,
    lib/types.ts) with well-defined scope and explicit code snippets. It's too
    substantive for an errand (multi-file change with new SQL query logic and
    type changes) but nowhere near expedition scale (no independent subsystems,
    no architecture work). Excursion is the right fit. Compile uses planner plus
    plan-review-cycle because the PRD has subtle semantics — correctly threading
    `workspace` through call sites, removing `hasFilter` branching by
    construction, and the reversible `langfuseTraceId` change — all worth
    catching at plan time. Build uses implement followed by review-cycle
    (correctness + maintainability perspectives, standard strictness, 2 rounds)
    since the change is deterministic-lookup logic with clear acceptance
    criteria and the risk is primarily regression (removing the unfiltered
    fallback must not break happy-path metric extraction). doc-update runs in
    parallel as a defensive step in case the CLAUDE.md or inline comments
    reference the old log-parsing approach. No test-write/test stages because
    the PRD's verification is end-to-end (`pnpm type-check` plus re-running the
    failing scenario) rather than unit-test-driven, and the harness has no
    existing unit test suite to extend.
