name: side-by-side-variant-comparison-analysis-for-eval-harness
description: Add side-by-side variant comparison analysis to the eval harness —
  extract shared types, create scenario loader, build comparison module with
  eight-dimension analysis, integrate into run.sh, and expose via MCP tool.
created: 2026-04-05
compiled: 2026-04-05
mode: excursion
base_branch: main
validate:
  - pnpm type-check
plans:
  - id: plan-01-shared-types-and-scenario-loader
    name: Extract Shared Types and Create Scenario Loader
    depends_on: []
    branch: side-by-side-variant-comparison-analysis-for-eval-harness/shared-types-and-scenario-loader
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-comparison-module-and-integration
    name: Comparison Module, run.sh Integration, and MCP Tool
    depends_on:
      - plan-01-shared-types-and-scenario-loader
    branch: side-by-side-variant-comparison-analysis-for-eval-harness/comparison-module-and-integration
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: auto
    perspectives:
      - correctness
      - maintainability
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "Excursion scope: this PRD touches 7 files across type extraction,
    three new TypeScript modules, bash integration, and MCP server modification
    — clearly multi-file feature work — but all changes serve a single cohesive
    feature (variant comparison) without the 4+ independent subsystems that
    would warrant expedition. Plan-review-cycle is included because the
    implementation has ordered dependencies (types before imports, scenarios
    loader before compare module) and the planner needs to get the sequencing
    right. Review-cycle with correctness and maintainability perspectives covers
    the two main risks: (1) type extraction refactoring must not break existing
    analyze.ts/build-result.ts, comparison dimension functions must handle edge
    cases like $0 cost correctly, and the MCP tool must correctly read
    comparison.json; (2) the new modules are foundational infrastructure for
    future bash→TS migration, so clean interfaces and separation of concerns
    matter. Two rounds at standard strictness is appropriate for feature work
    with moderate complexity — not security-critical but has enough moving parts
    to benefit from iterative review. No test-write stage since the PRD's
    acceptance criteria focus on type-checking and integration behavior rather
    than unit tests, and no doc-update since there are no public API docs to
    maintain."
