# Implementation-tier model probe. Identical to claude-sdk-opus.yaml except
# the implementation tier uses Opus instead of Sonnet at the same medium
# effort. Pair with claude-sdk-opus to attribute the marginal cost and quality
# contribution of using Opus on the build path — the only leaf diff is
# agents.tiers.implementation.model.
agents:
  tiers:
    planning:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
    implementation:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: medium
    review:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
    evaluation:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
