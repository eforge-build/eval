# Subagent ablation. Identical to `claude-sdk-opus.yaml` except the Claude SDK
# `Task` tool is disabled, so roles cannot fan out into subagents. Pair with
# `claude-sdk-opus` to measure the contribution of subagents to a run.
# Claude SDK only — Pi has no subagent concept.
agents:
  tiers:
    planning:
      harness: claude-sdk
      claudeSdk:
        disableSubagents: true
      model: claude-opus-4-7
      effort: high
    implementation:
      harness: claude-sdk
      claudeSdk:
        disableSubagents: true
      model: claude-sonnet-4-6
      effort: medium
    review:
      harness: claude-sdk
      claudeSdk:
        disableSubagents: true
      model: claude-opus-4-7
      effort: high
    evaluation:
      harness: claude-sdk
      claudeSdk:
        disableSubagents: true
      model: claude-opus-4-7
      effort: high
