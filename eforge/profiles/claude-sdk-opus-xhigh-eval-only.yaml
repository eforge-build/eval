# Tier-effort probe. Identical to claude-sdk-opus.yaml except the evaluation
# tier runs at xhigh effort. Pair with claude-sdk-opus to isolate the marginal
# cost and quality contribution of higher evaluation effort alone — the only
# leaf diff is agents.tiers.evaluation.effort, so compare.ts marginal-delta
# attribution fires cleanly.
agentRuntimes:
  default:
    harness: claude-sdk
defaultAgentRuntime: default
agents:
  models:
    max:
      id: claude-opus-4-7
    balanced:
      id: claude-sonnet-4-6
  tiers:
    planning:
      effort: high
      modelClass: max
    implementation:
      effort: medium
      modelClass: balanced
    review:
      effort: high
      modelClass: max
    evaluation:
      effort: xhigh
      modelClass: max
