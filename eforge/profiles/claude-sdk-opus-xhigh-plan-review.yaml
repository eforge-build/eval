# Quality-tilted variant. Identical to `claude-sdk-opus.yaml` except planning
# and review tiers run at `xhigh` effort. Evaluation tier stays at `high` so
# the only deltas vs. the baseline are on the two tiers named in the profile.
agents:
  tiers:
    planning:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: xhigh
    implementation:
      harness: claude-sdk
      model: claude-sonnet-4-6
      effort: medium
    review:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: xhigh
    evaluation:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
