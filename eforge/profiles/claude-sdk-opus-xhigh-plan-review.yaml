# Quality-tilted variant. Identical to `claude-sdk-opus.yaml` except planning
# and review tiers run at `xhigh` effort. Evaluation tier stays at `high` so
# the only deltas vs. the baseline are on the two tiers named in the profile.
agentRuntimes:
  default:
    harness: claude-sdk
defaultAgentRuntime: default
agents:
  models:
    max:
      id: claude-opus-4-7
    balanced:
      id: claude-sonnet-4-6
  tiers:
    planning:
      effort: xhigh
      modelClass: max
    implementation:
      effort: medium
      modelClass: balanced
    review:
      effort: xhigh
      modelClass: max
    evaluation:
      effort: high
      modelClass: max
