# Flagship baseline. Claude SDK + Opus 4.7 for planning/review/evaluation,
# Sonnet 4.6 for implementation. All four tiers set explicitly.
agents:
  tiers:
    planning:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
    implementation:
      harness: claude-sdk
      model: claude-sonnet-4-6
      effort: medium
    review:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
    evaluation:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
