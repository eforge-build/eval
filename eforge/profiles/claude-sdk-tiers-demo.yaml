# Demonstration profile: all four tiers set explicitly with their built-in
# default values. Resolves to the same behavior as a profile with no tiers
# section — the point is to show the shape and inline the role membership
# so per-tier knobs can be edited without re-checking the source.
#
# Tier role membership (canonical: AGENT_ROLE_TIERS in
# packages/engine/src/pipeline/agent-config.ts):
#   planning       → planner, module-planner, formatter, pipeline-composer,
#                    dependency-detector
#   implementation → builder, review-fixer, validation-fixer,
#                    merge-conflict-resolver, doc-updater, test-writer,
#                    tester, gap-closer, recovery-analyst
#   review         → reviewer, architecture-reviewer, cohesion-reviewer,
#                    plan-reviewer, staleness-assessor, prd-validator
#   evaluation     → evaluator, architecture-evaluator, cohesion-evaluator,
#                    plan-evaluator
#
# Per-tier knobs available: effort, modelClass, model, thinking, maxTurns,
# maxBudgetUsd, allowedTools, disallowedTools, agentRuntime.
agentRuntimes:
  default:
    harness: claude-sdk
defaultAgentRuntime: default
agents:
  models:
    max:
      id: claude-opus-4-7
    balanced:
      id: claude-sonnet-4-6
  tiers:
    planning:
      effort: high
      modelClass: max
    implementation:
      effort: medium
      modelClass: balanced
    review:
      effort: high
      modelClass: max
    evaluation:
      effort: high
      modelClass: max
