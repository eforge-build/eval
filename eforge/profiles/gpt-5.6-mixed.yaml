# Mixed GPT-5.6 tier allocation. Maps the strongest model (sol) to
# planning and evaluation, and the balanced model (terra) to implementation.
# Comparable to claude-sdk-opus / pi-opus tiering, but using the GPT-5.6
# series via Pi's openai-codex provider.
agents:
  tiers:
    planning:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.6-sol
      effort: high
    implementation:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.6-terra
      effort: medium
    review:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.6-sol
      effort: high
    evaluation:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.6-terra
      effort: high
