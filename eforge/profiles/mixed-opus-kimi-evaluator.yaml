# Tier-runtime offload probe. Identical to `claude-sdk-opus.yaml` except the
# entire evaluation tier (evaluator, architecture-evaluator, cohesion-evaluator,
# plan-evaluator) runs through Pi + OpenRouter using Moonshot Kimi K2.6
# (open-weights, cheap). Evaluators compare/judge artifacts; a cheaper model
# is often adequate. Pair with claude-sdk-opus to validate the cost/quality
# tradeoff of offloading the eval lane while keeping planning/implementation/
# review on claude-sdk + Opus/Sonnet.
#
# Note: previously this profile offloaded only the `evaluator` role via a
# per-role override. The new schema does not expose role-level harness/model
# overrides, so the entire evaluation tier moves together.
agents:
  tiers:
    planning:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
    implementation:
      harness: claude-sdk
      model: claude-sonnet-4-6
      effort: medium
    review:
      harness: claude-sdk
      model: claude-opus-4-7
      effort: high
    evaluation:
      harness: pi
      pi:
        provider: openrouter
      model: moonshotai/kimi-k2.6
      effort: high
