# Per-role offload probe. Identical to claude-sdk-opus.yaml except the
# `tester` role runs through Pi + OpenRouter using Moonshot Kimi K2.6
# (open-weights, cheap). Test generation is mechanical enough that a cheaper
# model often suffices. Pair with claude-sdk-opus to validate the cost/quality
# tradeoff of offloading tester to a cheap lane while keeping the rest of the
# build on claude-sdk + Opus/Sonnet.
agentRuntimes:
  default:
    harness: claude-sdk
  pi-kimi:
    harness: pi
    pi:
      provider: openrouter
defaultAgentRuntime: default
agents:
  models:
    max:
      id: claude-opus-4-7
    balanced:
      id: claude-sonnet-4-6
  tiers:
    planning:
      effort: high
      modelClass: max
    implementation:
      effort: medium
      modelClass: balanced
    review:
      effort: high
      modelClass: max
    evaluation:
      effort: high
      modelClass: max
  roles:
    tester:
      agentRuntime: pi-kimi
      model:
        id: moonshotai/kimi-k2.6
