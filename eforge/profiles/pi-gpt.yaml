# Frontier OpenAI lane via Pi's openai-codex provider. GPT-5.5 across every
# tier since the codex provider doesn't ship a clean smaller sibling —
# homogenizing the model is the cleanest cross-family signal. Pair with
# `pi-opus` to isolate model family on identical Pi harness.
agents:
  tiers:
    planning:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.5
      effort: high
    implementation:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.5
      effort: medium
    review:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.5
      effort: high
    evaluation:
      harness: pi
      pi:
        provider: openai-codex
      model: gpt-5.5
      effort: high
