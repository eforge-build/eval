# Frontier non-Western open-weights lane via Pi's openrouter provider, model
# `moonshotai/kimi-k2.6`. Kimi K2.6 across both `max` and `balanced` since
# OpenRouter doesn't ship a clean smaller sibling — homogenizing the model is
# the cleanest cross-family signal. Pair with `pi-opus` and `pi-gpt` to compare
# Anthropic vs OpenAI vs Moonshot on identical Pi harness.
agentRuntimes:
  default:
    harness: pi
    pi:
      provider: openrouter
defaultAgentRuntime: default
agents:
  models:
    max:
      id: moonshotai/kimi-k2.6
    balanced:
      id: moonshotai/kimi-k2.6
  tiers:
    planning:
      effort: high
      modelClass: max
    implementation:
      effort: medium
      modelClass: balanced
    review:
      effort: high
      modelClass: max
    evaluation:
      effort: high
      modelClass: max
