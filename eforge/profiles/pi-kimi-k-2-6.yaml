# Frontier non-Western open-weights lane via Pi's openrouter provider, model
# `moonshotai/kimi-k2.6`. Kimi K2.6 across every tier since OpenRouter doesn't
# ship a clean smaller sibling — homogenizing the model is the cleanest
# cross-family signal. Pair with `pi-opus` and `pi-gpt` to compare Anthropic
# vs OpenAI vs Moonshot on identical Pi harness.
agents:
  tiers:
    planning:
      harness: pi
      pi:
        provider: openrouter
      model: moonshotai/kimi-k2.6
      effort: high
    implementation:
      harness: pi
      pi:
        provider: openrouter
      model: moonshotai/kimi-k2.6
      effort: medium
    review:
      harness: pi
      pi:
        provider: openrouter
      model: moonshotai/kimi-k2.6
      effort: high
    evaluation:
      harness: pi
      pi:
        provider: openrouter
      model: moonshotai/kimi-k2.6
      effort: high
