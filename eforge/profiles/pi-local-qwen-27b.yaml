# Local Qwen 27b via Pi's llama-cpp provider. Mirrors pi-kimi-k-2-6.yaml's
# structure (homogenized model across tiers) but targets a self-hosted model
# for offline/low-cost eval runs.
agentRuntimes:
  default:
    harness: pi
    pi:
      provider: llama-cpp
defaultAgentRuntime: default
agents:
  models:
    max:
      id: qwen-27b
    balanced:
      id: qwen-27b
  tiers:
    planning:
      effort: high
      modelClass: max
    implementation:
      effort: medium
      modelClass: balanced
    review:
      effort: high
      modelClass: max
    evaluation:
      effort: high
      modelClass: max
