# Same models and tiers as `claude-sdk-opus.yaml`, but routed through the Pi
# harness via the anthropic provider. Pair with `claude-sdk-opus` to isolate
# the harness implementation while holding the model constant.
agents:
  tiers:
    planning:
      harness: pi
      pi:
        provider: anthropic
      model: claude-opus-4-7
      effort: high
    implementation:
      harness: pi
      pi:
        provider: anthropic
      model: claude-sonnet-4-6
      effort: medium
    review:
      harness: pi
      pi:
        provider: anthropic
      model: claude-opus-4-7
      effort: high
    evaluation:
      harness: pi
      pi:
        provider: anthropic
      model: claude-opus-4-7
      effort: high
