          backend: claude-sdk
      - variantLabel: pi-nemotron
        envFile: env/pi.env
        configOverlay:
          backend: pi
          agents:
            models:
              max:
                provider: openrouter
                id: nvidia/nemotron-3-super-120b-a12b:free

  - id: todo-api-errand-skip
    fixture: todo-api
    prd: docs/skip-already-done.md
    validate:
      - pnpm install
      - pnpm type-check
      - pnpm test
    description: "PRD describes what db.ts already implements - should skip"
    expect:
      mode: errand
      skip: true
    matrix:
      - variantLabel: claude-sdk
        configOverlay:
          backend: claude-sdk
      - variantLabel: pi-nemotron
        envFile: env/pi.env
