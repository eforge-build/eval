# Eforge evaluation scenarios
# Each scenario defines a fixture + PRD to run eforge against.
# Fixtures live in eval/fixtures/<fixture>/ as plain project files (no .git).
#
# Matrix: scenarios with a `matrix` field expand into one scenario per variant.
# Generated IDs follow the pattern: <base-id>--<variantLabel>.
# All variants in a matrix share a compareGroup for side-by-side comparison.

scenarios:
  # --- todo-api ---

  - id: todo-api-errand-health-check
    fixture: todo-api
    prd: docs/add-health-check.md
    description: "Add GET /health endpoint to Express API"
    expect:
      mode: errand
      buildStagesExclude:
        - test-cycle
    matrix:
      - variantLabel: claude-sdk
        validate:
          - pnpm install
          - pnpm type-check
          - pnpm test
          - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
        configOverlay:
          backend: claude-sdk
      - variantLabel: pi-nemotron
        validate:
          - pnpm install
          - pnpm type-check
          - pnpm test
          - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
          - test -f .pi-extension-loaded
        envFile: env/pi.env
        configOverlay:
          backend: pi
          agents:
            models:
              max:
                provider: openrouter
                id: nvidia/nemotron-3-super-120b-a12b:free
      - variantLabel: pi-codex
        validate:
          - pnpm install
          - pnpm type-check
          - pnpm test
          - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
          - test -f .pi-extension-loaded
        configOverlay:
          backend: pi
          agents:
            models:
              max:
                provider: openai-codex
                id: gpt-5.4
      - variantLabel: pi-glm
        validate:
          - pnpm install
          - pnpm type-check
          - pnpm test
          - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
          - test -f .pi-extension-loaded
        envFile: env/pi.env
        configOverlay:
          backend: pi
          agents:
            models:
              max:
                provider: openrouter
                id: z-ai/glm-5.1
      - variantLabel: pi-gemma4
        validate:
          - pnpm install
          - pnpm type-check
          - pnpm test
          - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
          - test -f .pi-extension-loaded
        configOverlay:
          backend: pi
          agents:
            models:
              max:
                provider: llama-cpp
                id: gemma-4

